<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Quiz</title>
  <link rel="stylesheet" href="/client/quiz-styles.css">
  <link rel="stylesheet" href="/katex/katex.min.css">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 1rem;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      width: 100%;
      max-width: 480px;
      background: white;
      border-radius: 0.5rem;
      padding: 1.5rem;
      box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
      margin-top: 2rem;
    }
    h1 {
      font-size: 1.5rem;
      margin: 0 0 1rem 0;
      text-align: center;
      color: #1e293b;
    }
    .room-info {
      text-align: center;
      color: #64748b;
      font-size: 0.875rem;
      margin-bottom: 1.5rem;
    }
    .input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid #e2e8f0;
      border-radius: 0.5rem;
      font-size: 1rem;
      margin-bottom: 0.75rem;
      background: #f8fafc;
    }
    .input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    .btn {
      width: 100%;
      padding: 0.75rem 1rem;
      border: none;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary {
      background: #2563eb;
      color: white;
    }
    .btn-primary:hover {
      background: #1d4ed8;
    }
    .error {
      color: #dc2626;
      background: rgba(220, 38, 38, 0.05);
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      border: 1px solid rgba(220, 38, 38, 0.2);
      margin: 0.5rem 0;
    }
    .waiting {
      text-align: center;
      padding: 2rem;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e2e8f0;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .question {
      text-align: center;
    }
    .question-counter {
      color: #64748b;
      font-size: 0.875rem;
      margin-bottom: 0.5rem;
    }
    .question-text {
      font-size: 1.125rem;
      font-weight: 500;
      margin: 1rem 0;
      line-height: 1.5;
    }
    .timer {
      font-size: 1.5rem;
      font-weight: 600;
      color: #2563eb;
      margin: 0.5rem 0;
    }
    .timer.urgent {
      color: #dc2626;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-top: 1rem;
    }
    .option-btn {
      padding: 1rem;
      border: 1px solid #e2e8f0;
      border-radius: 0.5rem;
      background: #f8fafc;
      cursor: pointer;
      text-align: left;
      font-size: 1rem;
      transition: all 0.15s;
    }
    .option-btn:hover {
      background: #e2e8f0;
      border-color: #cbd5e1;
    }
    .results {
      text-align: center;
    }
    .my-stats {
      font-size: 1rem;
      color: #2563eb;
      font-weight: 500;
      margin: 0.5rem 0;
    }
    .leaderboard {
      margin-top: 1rem;
    }
    .leaderboard-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #e2e8f0;
    }
    .leaderboard-item.me {
      background: rgba(37, 99, 235, 0.05);
      font-weight: 600;
    }
    .rank {
      width: 2rem;
      text-align: center;
      font-weight: 600;
    }
    .name {
      flex: 1;
      margin-left: 1rem;
      text-align: left;
    }
    .score {
      font-weight: 600;
      color: #2563eb;
    }
    .waiting-text {
      color: #64748b;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Join Quiz</h1>
    <div class="room-info">Room: <span id="room-id">-</span></div>
    <div id="content"></div>
  </div>
  <script type="module" src="/client/quiz-client.js"></script>
</body>
</html>
