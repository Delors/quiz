<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Control</title>
  <link rel="stylesheet" href="/katex/katex.min.css">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 1rem;
      background: #f8fafc;
      min-height: 100vh;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    .login-container {
      max-width: 400px;
      margin: 3rem auto;
      background: white;
      padding: 2rem;
      border-radius: 0.5rem;
      box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
    }
    .login-container h2 {
      margin: 0 0 1.5rem 0;
      text-align: center;
      color: #1e293b;
    }
    .input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid #e2e8f0;
      border-radius: 0.5rem;
      font-size: 1rem;
      margin-bottom: 0.75rem;
      background: #f8fafc;
    }
    .input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary {
      background: #2563eb;
      color: white;
      width: 100%;
    }
    .btn-primary:hover {
      background: #1d4ed8;
    }
    .btn-secondary {
      background: #f8fafc;
      color: #1e293b;
      border: 1px solid #e2e8f0;
    }
    .btn-secondary:hover {
      background: #e2e8f0;
    }
    .btn-success {
      background: #16a34a;
      color: white;
    }
    .btn-success:hover {
      background: #15803d;
    }
    .btn-danger {
      background: #dc2626;
      color: white;
    }
    .btn-danger:hover {
      background: #b91c1c;
    }
    .btn-disabled {
      background: #cbd5e1;
      color: #64748b;
      cursor: not-allowed;
      opacity: 0.6;
    }
    .btn-disabled:hover {
      background: #cbd5e1;
    }
    .error {
      color: #dc2626;
      background: rgba(220, 38, 38, 0.05);
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      border: 1px solid rgba(220, 38, 38, 0.2);
      margin: 0.5rem 0;
    }
    .control-container {
      background: white;
      border-radius: 0.5rem;
      padding: 1.5rem;
      box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
    }
    .control-header {
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 1rem;
      margin-bottom: 1rem;
    }
    .control-header h2 {
      margin: 0 0 0.5rem 0;
      color: #1e293b;
    }
    .room-info {
      display: flex;
      gap: 1rem;
      color: #64748b;
      font-size: 0.875rem;
    }
    .participant-count {
      color: #2563eb;
      font-weight: 500;
    }
    .control-panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }
    @media (max-width: 640px) {
      .control-panel {
        grid-template-columns: 1fr;
      }
    }
    .status-panel {
      background: #f8fafc;
      border-radius: 0.5rem;
      padding: 1rem;
    }
    .status-item {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
      border-bottom: 1px solid #e2e8f0;
    }
    .status-item:last-child {
      border-bottom: none;
    }
    .status-label {
      color: #64748b;
      font-size: 0.875rem;
    }
    .status-value {
      font-weight: 500;
      color: #1e293b;
    }
    .actions-panel {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .question-panel {
      background: white;
      border-radius: 0.5rem;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
    }
    .question-panel h3 {
      margin: 0 0 0.75rem 0;
      color: #64748b;
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .question-text {
      font-size: 1.125rem;
      line-height: 1.6;
      color: #1e293b;
    }
    .results-panel {
      background: #f8fafc;
      border-radius: 0.5rem;
      padding: 1rem;
      margin-bottom: 1.5rem;
    }
    .results-panel h3 {
      margin: 0 0 1rem 0;
      color: #1e293b;
    }
    .answers-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .answer-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem;
      background: white;
      border-radius: 0.25rem;
      border: 1px solid #e2e8f0;
    }
    .answer-name {
      flex: 1;
      font-weight: 500;
    }
    .answer-value {
      color: #64748b;
      margin: 0 1rem;
    }
    .answer-points {
      font-weight: 600;
      color: #dc2626;
    }
    .answer-points.positive {
      color: #16a34a;
    }
    .leaderboard-panel {
      background: #f8fafc;
      border-radius: 0.5rem;
      padding: 1rem;
    }
    .leaderboard-panel h3 {
      margin: 0 0 1rem 0;
      color: #1e293b;
    }
    .leaderboard {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .leaderboard-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem;
      background: white;
      border-radius: 0.25rem;
      border: 1px solid #e2e8f0;
    }
    .leaderboard-item:first-child {
      background: rgba(37, 99, 235, 0.05);
      border-color: #2563eb;
    }
    .leaderboard-item .rank {
      width: 2rem;
      text-align: center;
      font-weight: 600;
    }
    .leaderboard-item .name {
      flex: 1;
      margin-left: 1rem;
    }
    .leaderboard-item .score {
      font-weight: 600;
      color: #2563eb;
    }
    .empty {
      color: #64748b;
      text-align: center;
      padding: 1rem;
    }
    .sessions-container {
      max-width: 800px;
      margin: 0 auto;
    }
    .sessions-container h2 {
      color: #1e293b;
      margin-bottom: 1.5rem;
    }
    .sessions-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .session-card {
      background: white;
      border-radius: 0.5rem;
      padding: 1.5rem;
      box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .session-card h3 {
      margin: 0 0 0.5rem 0;
      color: #1e293b;
    }
    .session-card p {
      margin: 0.25rem 0;
      color: #64748b;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="content"></div>
  </div>
  <script type="module" src="/client/quiz-control.js"></script>
</body>
</html>
